<<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鍾佳言- 財金歷程</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #fff9e6; /* 使用我們之前設定的財金主題色（淺黃） */
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h1 {
            color: #ffcc00;
            text-align: center;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 10px;
        }

        /* 時間軸外框 */
        .timeline {
            position: relative;
            margin: 30px 0;
            padding-left: 40px;
            border-left: 3px solid #ffcc00;
        }

        /* 時間軸節點 */
        .timeline-item {
            position: relative;
            margin-bottom: 40px;
        }

        /* 圓圈點點 */
        .timeline-item::before {
            content: "";
            position: absolute;
            left: -48.5px;
            top: 5px;
            width: 14px;
            height: 14px;
            background-color: white;
            border: 3px solid #ffcc00;
            border-radius: 50%;
            z-index: 1;
        }

        .year {
            font-weight: bold;
            font-size: 1.2em;
            color: #d4a017;
            display: block;
            margin-bottom: 5px;
        }

        .content {
            background: #fefefe;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #666;
            font-size: 0.9em;
        }

        .back-btn:hover { color: #ffcc00; }
    </style>
</head>
<body>

<div class="container">
    <h1>💰 財金學習歷程</h1>
    
    <div class="timeline">
        <div class="timeline-item">
            <span class="year">高一：啟蒙階段</span>
            <div class="content">
                <p>開始閱讀經濟學入門書籍，了解基本的複利概念與儲蓄重要性。</p>
            </div>
        </div>

        <div class="timeline-item">
            <span class="year">高二：深入探索</span>
            <div class="content">
                <p>參加校內模擬投資競賽，學習如何解讀財報與觀察市場趨勢。</p>
            </div>
        </div>

        <div class="timeline-item">
            <span class="year">高三：實踐與規劃</span>
            <div class="content">
                <p>考取初級理財規劃證照，並建立自己的數位資產配置筆記。</p>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-btn">← 回到首頁</a>
</div>

</body>
</html>
