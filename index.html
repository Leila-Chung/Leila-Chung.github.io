<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鍾佳言的個人網站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Microsoft JhengHei", -apple-system, sans-serif;
            line-height: 1.7;
            color: #444;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4ecf7 100%);
            min-height: 100vh;
        }

        /* 🌍 全螢幕橫幅 (純白底色) */
        .header-wrapper {
            width: 100%;
            background: #ffffff; 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            margin-bottom: 60px;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 1400px;
            display: flex;
            align-items: center;
            height: 600px; /* 橫幅高度 */
            position: relative;
        }

        /* 文字內容區 */
        .header-content {
            flex: 1;
            padding: 0 80px;
            z-index: 10;
            position: relative;
        }

        /* 照片區 (漸變淡出) */
        .header-photo {
            flex: 1.8;
            height: 100%;
            display: flex;
            justify-content: flex-end;
        }

        .header-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
            /* 💡 CSS 遮罩：實現從左到右由透明變清晰 */
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,1) 65%, rgba(0,0,0,1) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,1) 65%, rgba(0,0,0,1) 100%);
        }

        h1 {
            color: #1a1a1a;
            font-size: 3.5em;
            margin-bottom: 15px;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .tagline {
            color: #555;
            font-size: 1.2em;
            margin-bottom: 40px;
            border-left: 4px solid #5a7d9a;
            padding-left: 20px;
        }

        .links a {
            color: #5a7d9a;
            text-decoration: none;
            padding: 10px 25px;
            border: 2px solid #5a7d9a;
            border-radius: 30px;
            font-weight: bold;
            margin-right: 10px;
            transition: 0.3s;
        }

        .links a:hover {
            background: #5a7d9a;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        h2 { color: #5a7d9a; margin-bottom: 30px; font-size: 1.7em; }

        .navigation-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .nav-circle {
            text-decoration: none;
            color: #444;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .nav-circle:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .finance-tag { border-top: 6px solid #ffebac; }
        .tech-tag { border-top: 6px solid #a3cfff; }
        .humanity-tag { border-top: 6px solid #bde89f; }
        .art-tag { border-top: 6px solid #ffccd1; }

        footer { text-align: center; color: #999; margin: 60px 0; }

        @media (max-width: 900px) {
            header { height: auto; flex-direction: column-reverse; }
            .header-photo { width: 100%; height: 350px; }
            .header-photo img {
                -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
                mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            }
            .header-content { text-align: center; padding: 40px 20px; }
            h1 { font-size: 2.8em; }
            .navigation-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <header>
            <div class="header-content">
                <h1>鍾佳言</h1>
                <p class="tagline">跨領域學習者<br>資安研究 | 人文探索</p>
                <div class="links">
                    <a href="mailto:your@email.com">Email</a>
                    <a href="#">GitHub</a>
                    <a href="#">IG</a>
                </div>
            </div>
            <div class="header-photo">
                <img src="profile.jpg" alt="鍾佳言的個人照片">
            </div>
        </header>
    </div>

    <div class="container">
        <section class="section">
            <h2>👤 About Me</h2>
            <p>你好，我是鍾佳言。目前專注於跨領域的學習與整合，我相信不同學科間的碰撞能產生最有趣的火花。</p>
            <p>包含了我對財金、資訊、人文與藝術的熱情。</p>
        </section>

        <section class="section">
            <h2>核心歷程 (點擊探索)</h2>
            <div class="navigation-grid">
                <a href="finance.html" class="nav-circle finance-tag">
                    <span style="font-size: 2em;">💰</span>
                    <span>財金領域</span>
                </a>
                <a href="tech.html" class="nav-circle tech-tag">
                    <span style="font-size: 2em;">💻</span>
                    <span>資訊科技</span>
                </a>
                <a href="humanity.html" class="nav-circle humanity-tag">
                    <span style="font-size: 2em;">📖</span>
                    <span>人文社會</span>
                </a>
                <a href="art.html" class="nav-circle art-tag">
                    <span style="font-size: 2em;">🎨</span>
                    <span>藝術創作</span>
                </a>
            </div>
        </section>

        <footer>
            <p>© 2026 鍾佳言. Built with ❤️</p>
        </footer>
    </div>

</body>
</html>
