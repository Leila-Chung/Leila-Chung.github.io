<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鍾佳言的個人網站</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* --- 背景圖片設定區 --- */
            background-image: url('你的圖片網址.jpg'); /* 替換成你的圖片路徑 */
            background-size: cover; /* 讓圖片鋪滿整個螢幕 */
            background-position: center; /* 圖片置中 */
            background-attachment: fixed; /* 捲動時背景固定 */
            background-color: #f0f2f5; /* 圖片失效時的備用底色 */
        }

        /* 整個核心區域的容器 */
        .main-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 中間的方形自介區塊 */
        .center-card {
            background: rgba(255, 255, 255, 0.9); /* 半透明白色，透出背景感 */
            backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 10;
            width: 220px;
        }

        /* 圓圈按鈕的通用樣式 */
        .circle-link {
            position: absolute;
            text-decoration: none;
            color: white;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .circle-link:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* --- 四個圓圈的位置設定 (環繞四周) --- */
        .finance { background-color: #ffcc00; top: 0; left: 0; }      /* 左上 */
        .tech { background-color: #4a90e2; top: 0; right: 0; }     /* 右上 */
        .humanity { background-color: #7ed321; bottom: 0; left: 0; } /* 左下 */
        .art { background-color: #f5a623; bottom: 0; right: 0; }      /* 右下 */

        .circle-link span { font-size: 1.5em; }
        h1 { font-size: 1.5em; margin: 10px 0; color: #333; }
        p { font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="center-card">
            <h1>鍾佳言</h1>
            <p>跨領域學習者<br>探索知識的交集</p>
        </div>

        <a href="finance.html" class="circle-link finance">
            <span>💰</span>財金
        </a>
        
        <a href="tech.html" class="circle-link tech">
            <span>💻</span>資訊
        </a>
        
        <a href="humanity.html" class="circle-link humanity">
            <span>📖</span>人文
        </a>
        
        <a href="art.html" class="circle-link art">
            <span>🎨</span>藝術
        </a>
    </div>

</body>
</html>
